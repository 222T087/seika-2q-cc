<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <style>
        body {
            background-color: #e9e9e9;
            text-align: center;
        }

        .container {
            overflow: hidden;
            margin: 100px auto;
            padding: 50px 0;
            width: 100%;
            height: auto;
            display: flex;
            justify-content: space-evenly;
            flex-wrap: wrap;
            align-items: center;
            gap: 15rem;
        }

        .item {
            margin: 15px;
            width: 90%;
            height: auto;
            color: #212121;
            font-size: 0.2em;
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .title {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .text {
            font-size: clamp(8rem, 6vw, 10rem);
            font-weight: bold;
            color: #333;
        }

        .item_text {
            font-size: 2rem;
            font-weight: bold;
        }

        img {
            margin: 0 auto;
        }

        .wrapper {
            padding: 20px;
        }

        .square {
            background-color: rgb(90, 135, 255);
            width: 50px;
            height: 50px;
            cursor: pointer;
        }

        .youtube {
            position: relative;
            width: 100%;
            overflow: hidden;
            padding-bottom: 56.25%;
            margin: 0 auto;
        }

        .youtube iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            /*境界線の打ち消し*/
        }

        .links {
            margin-top: 1rem;
            font-size: 1.5rem;
        }

        .links a {
            margin: 0 1rem;
            color: #1DA1F2;
            text-decoration: none;
        }

        .links a.youtube {
            color: #FF0000;
        }
    </style>
    <title>Shiira's Portfolio</title>
</head>

<body>
    <div class="title">
        <p class="text">Shiira's Portfolio</p>
    </div>

    <div class="text">⬇︎⬇︎⬇︎</div>

    <div class="container fade">
        <div class="item" data-aos="fade-down">
            <p class="item_text">LOGO</p>
            <img src="rogo.png" alt="" </div>

            <div class="item" data-aos="fade-right">
                <p class="item_text">MUSIC</p>
                <div class="youtube">
                    <div id="movie1"></div>
                </div>
            </div>

            <div class="item" data-aos="fade-left">
                <div class="youtube">
                    <div id="movie2"></div>
                </div>

                <div class="item" data-aos="fade">
                    <p class="item_text">SNS</p>
                    <div class="links">
                        <a href="https://x.com/Shiira_P" target="_blank">X(Twitter)</a>
                        <a href="https://www.youtube.com/@shiira_P" target="_blank"
                            class="youtube">YouTube</a>
                    </div>
                </div>
<!--
                <div class="item" data-aos="fade-up-left">
                    <p class="item_text">fade-up-left</p>
                </div>

                <div class="item" data-aos="fade-up-right">
                    <p class="item_text">fade-up-right</p>
                </div>

                <div class="item" data-aos="fade-down-left">
                    <p class="item_text">fade-down-left</p>
                </div>

                <div class="item" data-aos="fade-down-right">
                    <p class="item_text">fade-down-right</p>
                </div>
            -->
            </div>
            <script src="https://www.youtube.com/iframe_api"></script>
            <script src="app.js"></script>
</body>

</html>
